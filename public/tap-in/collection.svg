<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ff8533"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b21a8"/>
      <stop offset="100%" style="stop-color:#9333ea"/>
    </linearGradient>
    <linearGradient id="teal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#14b8a6"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="url(#bg)" width="600" height="350"/>
  
  <!-- Title -->
  <text x="300" y="35" font-family="Arial Black, sans-serif" font-size="22" fill="white" text-anchor="middle">TAP IN COLLECTION</text>
  <text x="300" y="55" font-family="Arial, sans-serif" font-size="11" fill="#888" text-anchor="middle">Connect instantly. Share anything.</text>
  
  <!-- Wristband -->
  <g transform="translate(50, 80)">
    <rect x="0" y="0" width="140" height="180" rx="12" fill="#151525" stroke="#333" stroke-width="1"/>
    <g transform="translate(70, 25)">
      <path d="M0 25 Q25 15 50 25 Q75 35 100 25 L100 60 Q75 50 50 60 Q25 70 0 60 Z" fill="url(#orange)"/>
      <text x="50" y="48" font-family="Arial Black, sans-serif" font-size="12" fill="white" text-anchor="middle">TAP IN</text>
    </g>
    <text x="70" y="120" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">NFC Wristband</text>
    <text x="70" y="135" font-family="Arial, sans-serif" font-size="12" fill="#ff6b00" text-anchor="middle" font-weight="bold">$15</text>
    <text x="70" y="165" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Reusable • Waterproof</text>
  </g>
  
  <!-- Tags (3-pack) -->
  <g transform="translate(230, 80)">
    <rect x="0" y="0" width="140" height="180" rx="12" fill="#151525" stroke="#333" stroke-width="1"/>
    <!-- 3 tags -->
    <g transform="translate(25, 20)">
      <rect x="0" y="0" width="40" height="50" rx="6" fill="url(#purple)" opacity="0.9"/>
      <rect x="50" y="0" width="40" height="50" rx="6" fill="url(#purple)" opacity="0.7"/>
      <rect x="0" y="55" width="40" height="50" rx="6" fill="url(#purple)" opacity="0.5"/>
    </g>
    <text x="70" y="120" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">NFC Tags (3-Pack)</text>
    <text x="70" y="135" font-family="Arial, sans-serif" font-size="12" fill="#9333ea" text-anchor="middle" font-weight="bold">$12</text>
    <text x="70" y="165" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Stick anywhere • Thin</text>
  </g>
  
  <!-- Card -->
  <g transform="translate(410, 80)">
    <rect x="0" y="0" width="140" height="180" rx="12" fill="#151525" stroke="#333" stroke-width="1"/>
    <g transform="translate(25, 20)">
      <rect x="0" y="0" width="90" height="55" rx="6" fill="url(#teal)"/>
      <text x="45" y="20" font-family="Arial Black, sans-serif" font-size="9" fill="white" text-anchor="middle">TAP IN</text>
      <text x="45" y="35" font-family="Arial, sans-serif" font-size="6" fill="white" text-anchor="middle" opacity="0.7">porterful.com</text>
    </g>
    <text x="70" y="120" font-family="Arial, sans-serif" font-size="10" fill="#aaa" text-anchor="middle">NFC Card</text>
    <text x="70" y="135" font-family="Arial, sans-serif" font-size="12" fill="#14b8a6" text-anchor="middle" font-weight="bold">$8</text>
    <text x="70" y="165" font-family="Arial, sans-serif" font-size="9" fill="#666" text-anchor="middle">Wallet size • Tap to share</text>
  </g>
  
  <!-- CTA -->
  <rect x="200" y="290" width="200" height="40" rx="20" fill="#ff6b00"/>
  <text x="300" y="316" font-family="Arial Black, sans-serif" font-size="14" fill="white" text-anchor="middle">SHOP NOW</text>

</svg>
