<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="band1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b00"/>
      <stop offset="100%" style="stop-color:#ff8533"/>
    </linearGradient>
    <linearGradient id="band2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#2d2d4a"/>
    </linearGradient>
    <linearGradient id="band3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6b21a8"/>
      <stop offset="100%" style="stop-color:#9333ea"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect fill="#0a0a0f" width="400" height="300"/>
  
  <!-- Band 1: Porterful Orange -->
  <g transform="translate(30, 50)">
    <!-- Wristband shape -->
    <path d="M0 40 Q50 20 100 40 Q150 60 200 40 L200 90 Q150 70 100 90 Q50 110 0 90 Z" fill="url(#band1)"/>
    <!-- Tap In text -->
    <text x="100" y="72" font-family="Arial Black, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">TAP IN</text>
    <!-- NFC icon -->
    <circle cx="100" cy="50" r="15" fill="none" stroke="white" stroke-width="2" opacity="0.5"/>
    <path d="M92 45 L108 45 M92 55 L108 55 M95 42 L95 58 M105 42 L105 58" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Porterful Edition</text>
    <text x="100" y="135" font-family="Arial, sans-serif" font-size="14" fill="#ff6b00" text-anchor="middle" font-weight="bold">$15</text>
  </g>
  
  <!-- Band 2: Dark Mode -->
  <g transform="translate(30, 180)">
    <path d="M0 40 Q50 20 100 40 Q150 60 200 40 L200 90 Q150 70 100 90 Q50 110 0 90 Z" fill="url(#band2)"/>
    <text x="100" y="72" font-family="Arial Black, sans-serif" font-size="18" font-weight="bold" fill="#ff6b00" text-anchor="middle">TAP IN</text>
    <circle cx="100" cy="50" r="15" fill="none" stroke="#ff6b00" stroke-width="2" opacity="0.5"/>
    <text x="100" y="120" font-family="Arial, sans-serif" font-size="10" fill="#666" text-anchor="middle">Dark Mode</text>
    <text x="100" y="135" font-family="Arial, sans-serif" font-size="14" fill="#ff6b00" text-anchor="middle" font-weight="bold">$15</text>
  </g>

</svg>
